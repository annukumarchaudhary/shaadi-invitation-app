<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin — Manage Invitation Entries</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;margin:20px;background-color:#fff9f5;color:#333;}
    table{border-collapse:collapse;width:100%;margin-top:15px;}
    th,td{border:1px solid #ddd;padding:10px;text-align:left;}
    th{background:#800020;color:white;}
    tr:nth-child(even){background-color: #f9f9f9;}
    .controls{display:flex;gap:6px;flex-wrap:nowrap;}
    .top{display:flex;gap:12px;align-items:center;margin-bottom:15px;flex-wrap:wrap;}
    input[type="password"], input[type="text"], select{padding:8px;border:1px solid #ccc;border-radius:4px;font-size:14px;box-sizing:border-box;}
    button{padding:8px 14px;background:#333;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:14px;font-weight:bold;}
    button:hover{opacity:0.9;}
    #clearAll{background:#800020;}
    .delete{background:#d9534f;padding:6px 10px;font-size:12px;}
    #exportAdminPdf{background:#28a745;}
    #sortDirBtn{background:#007bff;}
    
    /* ✨ Action specific styling */
    .edit-btn { background-color: #007bff; padding: 6px 10px; font-size: 12px; color: white; }
    .save-btn { background-color: #28a745; padding: 6px 10px; font-size: 12px; color: white; }
    .cancel-btn { background-color: #6c757d; padding: 6px 10px; font-size: 12px; color: white; }
    
    .inline-edit-input {
      width: 100%;
      padding: 6px;
      border: 1px solid #800020;
      border-radius: 4px;
      font-size: 13px;
      box-sizing: border-box;
    }
    
    #adminSearchInput { border: 2px solid #800020; background-color: #fff; width: 320px; }
    #adminSearchInput:focus { outline: none; box-shadow: 0 0 5px rgba(128, 0, 32, 0.4); }

    .village-filter-card {
      background: #fff;
      padding: 15px;
      border: 2px solid #800020;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    .village-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
      max-height: 150px;
      overflow-y: auto;
      padding: 5px;
      border-top: 1px solid #eee;
      margin-top: 10px;
    }
    .village-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      cursor: pointer;
      user-select: none;
    }
    .village-item input {
      cursor: pointer;
      accent-color: #800020;
      width: 16px;
      height: 16px;
    }
  </style>
</head>
<body>
  <h1>Admin — Manage Entries</h1>
  <div class="top">
    <label>Admin password: <input id="adminPw" type="password" /></label>
    <button id="savePw">Save</button>
    <button id="load">Reload</button>
    
    <label style="font-weight:bold;margin-left:10px;">Sort By: 
      <select id="sortBySelect">
        <option value="name">Name</option>
        <option value="address">Address</option>
        <option value="date" selected>Received Date</option>
      </select>
    </label>
    <button id="sortDirBtn" data-dir="desc">Order: Descending (Z-A) ↓</button>

    <div style="display: flex; align-items: center; gap: 6px; margin-left: 10px;">
      <span style="font-weight: bold;">🔍 Live Find:</span>
      <input type="text" id="adminSearchInput" placeholder="Try 'advocate mohania' or 'singh bhabhua'...">
    </div>

    <button id="exportAdminPdf">📄 Export to PDF</button>
    <button id="clearAll">Clear All Entries</button>
  </div>

  <div class="village-filter-card">
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <span style="font-weight: bold; color: #800020; font-size: 15px;">📍 Filter by Village / Address (Chuninda gao ka data dekhein):</span>
      <button id="clearVillageSelection" style="padding: 4px 10px; background: #6c757d; font-size: 12px;">Reset Selection</button>
    </div>
    <div id="villageFilterGrid" class="village-grid"></div>
  </div>
  
  <div id="status" style="font-weight:bold;margin-bottom:10px;"></div>
  
  <table id="list">
    <thead>
      <tr>
        <th style="width: 30%;">Name</th>
        <th style="width: 25%;">Address</th>
        <th style="width: 10%;">Guests Count</th>
        <th style="width: 20%;">Phone Number</th>
        <th style="width: 15%;">Actions</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script src="/admin.js"></script>
</body>
</html>
